<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>エコキュート部品検索</title>
<style>
  :root{
    --bg:#f2f5f9; --card:#ffffff; --line:#e2e8f0; --text:#1f2937; --sub:#64748b;
    --brand:#0d6efd; --brand-soft:#e7f0ff;
    --accent1:#0ea5e9; --accent2:#16a34a; --accent3:#f97316;
    --ok:#16a34a; --ok-bg:#ecfdf3; --warn:#b45309; --warn-bg:#fff7ed; --bad:#dc2626; --bad-bg:#fef2f2;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
  header{position:sticky;top:0;z-index:10;background:linear-gradient(135deg,#0d6efd,#0ea5e9);color:#fff;padding:14px 16px 12px;box-shadow:0 2px 10px rgba(0,0,0,.12);}
  header h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.02em;}
  header p{margin:3px 0 0;font-size:11.5px;opacity:.9;}
  .wrap{max-width:680px;margin:0 auto;padding:12px 14px 40px;}
  .searchbox{position:sticky;top:58px;z-index:9;background:var(--bg);padding:10px 0 8px;}
  .searchbox input{width:100%;font-size:16px;padding:13px 14px;border:2px solid var(--line);border-radius:14px;background:#fff;outline:none;transition:border-color .15s;}
  .searchbox input:focus{border-color:var(--brand);}
  .filters{display:flex;flex-wrap:wrap;gap:7px;margin-top:9px;}
  .chip{font-size:12.5px;padding:6px 13px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--sub);cursor:pointer;user-select:none;}
  .chip.active{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:600;}
  .count{font-size:12px;color:var(--sub);margin:12px 2px 6px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px 8px;margin-bottom:13px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
  .tank{font-size:18px;font-weight:700;letter-spacing:.02em;word-break:break-all;}
  .tank .tlabel{display:block;font-size:10.5px;font-weight:600;color:var(--sub);letter-spacing:.04em;margin-bottom:1px;}
  .maker{flex:none;font-size:11px;font-weight:600;color:var(--brand);background:var(--brand-soft);padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin:8px 0 4px;font-size:11.5px;color:var(--sub);}
  .tag{background:#f1f5f9;border-radius:6px;padding:2px 7px;}
  .conf{font-size:10.5px;font-weight:700;border-radius:6px;padding:2px 7px;}
  .conf.high{color:var(--ok);background:var(--ok-bg);}
  .conf.medium{color:var(--warn);background:var(--warn-bg);}
  .conf.low{color:var(--bad);background:var(--bad-bg);}
  .part{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px dashed var(--line);}
  .part .label{flex:none;width:96px;font-size:12px;font-weight:600;color:#fff;padding:4px 0;text-align:center;border-radius:8px;}
  .l1{background:var(--accent1);} .l2{background:var(--accent2);} .l3{background:var(--accent3);}
  .pn{font-size:15.5px;font-weight:600;word-break:break-all;flex:1;}
  .pn.empty{color:#cbd5e1;font-weight:400;}
  .copy{flex:none;font-size:12px;color:var(--brand);background:none;border:1px solid var(--line);padding:5px 10px;border-radius:8px;cursor:pointer;}
  .copy:active{background:var(--brand-soft);}
  .note{font-size:11.5px;color:var(--sub);padding:8px 0 2px;border-top:1px dashed var(--line);}
  .src{display:inline-block;font-size:11px;color:var(--brand);text-decoration:none;padding:4px 0 2px;}
  .empty-state{text-align:center;color:var(--sub);padding:50px 20px;font-size:14px;}
  .empty-state .big{font-size:40px;margin-bottom:8px;}
  .banner{font-size:12px;border-radius:12px;padding:10px 12px;margin-bottom:8px;background:var(--warn-bg);border:1px solid #fed7aa;color:var(--warn);}
  footer{text-align:center;font-size:11px;color:var(--sub);padding:24px 0 10px;line-height:1.7;}
  mark{background:#fff3b0;color:inherit;padding:0 1px;border-radius:3px;}
</style>
</head>
<body>
<header>
  <h1>🔧 エコキュート 部品検索</h1>
  <p>貯湯ユニット／システム形名から リモコン・脚部カバー・ヒートポンプ を検索</p>
</header>

<div class="wrap">
  <div class="searchbox">
    <input id="q" type="search" inputmode="search" autocomplete="off"
           placeholder="品番を入力（例：SRT-S377U / TUA46ZFV / HE-J37LQS）">
    <div class="filters" id="filters"></div>
  </div>

  <div class="banner">
    ⚠️ 品番は<b>発注前に必ず公式資料でご確認ください</b>。各カードの確度（公式確認/要確認/未確認）と「出典」リンクで照合できます。
  </div>

  <div class="count" id="count"></div>
  <div id="results"></div>

  <footer>
    社内用 ／ 収録 <span id="total"></span> 件 ／ 最終更新: <span id="updated"></span><br>
    出典: 各メーカー公式サイト・公式価格表／カタログ（一部は信頼できる販売店ページで照合）
  </footer>
</div>

/* ===== ここから下は仕組み（基本さわらなくてOK） ===== */
const $ = (s)=>document.querySelector(s);
let activeMaker = "すべて";
const CONF_LABEL = {high:"公式確認", medium:"要確認", low:"未確認"};

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));}
function highlight(text,q){
  const safe=escapeHtml(text||"");
  if(!q||!text) return safe;
  const i=text.toLowerCase().indexOf(q.toLowerCase());
  if(i<0) return safe;
  return escapeHtml(text.slice(0,i))+"<mark>"+escapeHtml(text.slice(i,i+q.length))+"</mark>"+escapeHtml(text.slice(i+q.length));
}
function buildFilters(){
  const makers=["すべて",...Array.from(new Set(PARTS_DATA.map(d=>d.maker))).filter(Boolean)];
  const box=$("#filters");box.innerHTML="";
  makers.forEach(m=>{
    const el=document.createElement("div");
    el.className="chip"+(m===activeMaker?" active":"");
    el.textContent=m;
    el.onclick=()=>{activeMaker=m;buildFilters();render();};
    box.appendChild(el);
  });
}
function partRow(cls,label,value,q){
  const has=value&&value.trim();
  return `<div class="part">
    <span class="label ${cls}">${label}</span>
    <span class="pn ${has?"":"empty"}">${has?highlight(value,q):"未登録"}</span>
    ${has?`<button class="copy" data-copy="${escapeHtml(value)}">コピー</button>`:""}
  </div>`;
}
function render(){
  const q=$("#q").value.trim();const ql=q.toLowerCase();
  let list=PARTS_DATA.filter(d=>{
    if(activeMaker!=="すべて"&&d.maker!==activeMaker) return false;
    if(!q) return true;
    return [d.tank,d.system,d.remote,d.legcover,d.heatpump,d.maker].some(v=>(v||"").toLowerCase().includes(ql));
  });
  $("#count").textContent=`${list.length} 件 / 全 ${PARTS_DATA.length} 件`;
  const results=$("#results");
  if(list.length===0){
    results.innerHTML=`<div class="empty-state"><div class="big">🔍</div>該当する品番が見つかりませんでした。<br>入力を確認するか、メーカー絞り込みを「すべて」にしてください。</div>`;
    return;
  }
  results.innerHTML=list.map(d=>`
    <div class="card">
      <div class="card-head">
        <div class="tank"><span class="tlabel">貯湯ユニット品番</span>${highlight(d.tank,q)}</div>
        <div class="maker">${escapeHtml(d.maker||"")}</div>
      </div>
      <div class="meta">
        <span class="tag">形名 ${highlight(d.system,q)}</span>
        ${d.region?`<span class="tag">${escapeHtml(d.region)}</span>`:""}
        <span class="conf ${d.conf}">${CONF_LABEL[d.conf]||""}</span>
      </div>
      ${partRow("l1","① リモコン",d.remote,q)}
      ${partRow("l2","② 脚部カバー",d.legcover,q)}
      ${partRow("l3","③ ヒートポンプ",d.heatpump,q)}
      ${d.note?`<div class="note">📝 ${escapeHtml(d.note)}</div>`:""}
      ${d.src?`<a class="src" href="${escapeHtml(d.src)}" target="_blank" rel="noopener">🔗 出典を確認</a>`:""}
    </div>`).join("");
  results.querySelectorAll(".copy").forEach(btn=>{
    btn.onclick=()=>{
      const v=btn.getAttribute("data-copy");
      navigator.clipboard?.writeText(v).then(()=>{const t=btn.textContent;btn.textContent="コピー済";setTimeout(()=>btn.textContent=t,1200);});
    };
  });
}
$("#q").addEventListener("input",render);
$("#updated").textContent=LAST_UPDATED;
$("#total").textContent=PARTS_DATA.length;
buildFilters();
render();
</script>
